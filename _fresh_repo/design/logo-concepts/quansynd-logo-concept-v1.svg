<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="qsGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d79a3d"/>
      <stop offset="100%" stop-color="#b8802b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" fill="#12110f"/>

  <!-- Premium monogram tile -->
  <g transform="translate(60,60)">
    <rect x="0" y="0" width="280" height="280" rx="64" fill="#0e0e0b" stroke="url(#qsGold)" stroke-opacity="0.6" stroke-width="3"/>

    <!-- Q form -->
    <circle cx="140" cy="135" r="76" stroke="url(#qsGold)" stroke-width="18" fill="none"/>
    <path d="M188 188 L224 224" stroke="url(#qsGold)" stroke-width="18" stroke-linecap="round"/>

    <!-- Synapse nodes (AI signal) -->
    <circle cx="82" cy="86" r="7" fill="#d79a3d" fill-opacity="0.9"/>
    <circle cx="204" cy="90" r="5" fill="#d79a3d" fill-opacity="0.7"/>
    <circle cx="95" cy="200" r="5" fill="#d79a3d" fill-opacity="0.7"/>
    <path d="M88 90 L126 112" stroke="#d79a3d" stroke-opacity="0.35" stroke-width="2"/>
    <path d="M200 96 L172 120" stroke="#d79a3d" stroke-opacity="0.35" stroke-width="2"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(390,155)">
    <text x="0" y="0" fill="#f3eee5" font-size="86" font-family="'Instrument Serif', serif" font-style="italic" letter-spacing="-1.2">Quan</text>
    <text x="260" y="0" fill="#f3eee5" font-size="86" font-family="'Instrument Serif', serif" letter-spacing="-1.2">Synd</text>

    <text x="2" y="58" fill="#b1a692" font-size="20" font-family="'Geist Mono', monospace" letter-spacing="3.2">INTELLIGENCE · DESIGN · CONSULTING</text>
